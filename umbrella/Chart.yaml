    version: 0.1.0
    repository: "file://../shop-service"
  - name: team-service
    version: 0.1.0
    repository: "file://../team-service"
  - name: tournament-service
    version: 0.1.0
    repository: "file://../tournament-service"
  - name: user-service
    version: 0.1.0
    repository: "file://../user-service"
