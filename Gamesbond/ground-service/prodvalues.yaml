name: ground-service
replicaCount: 3
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 1
  maxSurge: 2
image:
  name: maheshnandi/gamesbond-ground-service
  tag: v1.0.0
  pullPolicy: IfNotPresent
resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
service:
  port: 4005
  targetPort: 4005
config:
  mongourl: "mongodb://mongo-prod:27017"
  redisurl: "redis://redis-prod:6379"
