name: ground-service
replicaCount: 2
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 1
  maxSurge: 1
image:
  name: maheshnandi/gamesbond-ground-service
  tag: v1.0.0
  pullPolicy: IfNotPresent
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"
service:
  port: 4005
  targetPort: 4005
config:
  mongourl: "mongodb://mongo:27017"
  redisurl: "redis://redis:6379"
