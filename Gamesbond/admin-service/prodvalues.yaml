name: admin-service
replicaCount: 3
rollingUpdate:
  type: RollingUpdate
  maxUnavailable: 1
  maxSurge: 2
image:
  name: maheshnandi/gamesbond-admin-service
  tag: v1.0.0
  pullPolicy: IfNotPresent
resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
service:
  port: 4007
  targetPort: 4007
config:
  mongourl: "mongodb://mongo-prod:27017"
  redisurl: "redis://redis-prod:6379"
